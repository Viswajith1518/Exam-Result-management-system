<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Student</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',sans-serif;background:#F8FAFD;display:flex;min-height:100vh;}
  .sidebar{width:220px;background:#0B1F3A;flex-shrink:0;padding:20px 14px;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;}
  .brand{display:flex;align-items:center;gap:10px;padding:0 8px 24px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:20px;}
  .brand-icon{width:34px;height:34px;background:linear-gradient(135deg,#C9A84C,#B8962E);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
  .brand-name{font-size:16px;font-weight:700;color:white;}
  .nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:2px;color:rgba(255,255,255,0.6);font-size:14px;text-decoration:none;}
  .nav-link:hover{background:rgba(255,255,255,0.08);color:white;}
  .sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid rgba(255,255,255,0.08);}
  .main{margin-left:220px;flex:1;padding:28px;max-width:700px;}
  .page-title{font-size:26px;font-weight:700;color:#0B1F3A;margin-bottom:24px;}
  .form-card{background:white;border-radius:16px;border:1px solid #E2E8F0;padding:32px;box-shadow:0 2px 8px rgba(11,31,58,0.05);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .form-group{margin-bottom:16px;}
  .form-group.full{grid-column:1/-1;}
  label{display:block;font-size:12px;font-weight:600;color:#4A6080;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:6px;}
  input,select{width:100%;padding:11px 14px;border:1px solid #E2E8F0;border-radius:8px;font-size:14px;font-family:'Segoe UI',sans-serif;outline:none;}
  input:focus,select:focus{border-color:#0B1F3A;}
  .btn-primary{background:linear-gradient(135deg,#C9A84C,#B8962E);color:#0B1F3A;font-weight:700;border:none;padding:12px 24px;border-radius:8px;font-size:14px;cursor:pointer;}
  .btn-secondary{background:white;color:#4A6080;border:1px solid #E2E8F0;padding:12px 20px;border-radius:8px;font-size:14px;cursor:pointer;text-decoration:none;margin-left:10px;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="brand"><div class="brand-icon">🎓</div><span class="brand-name">ResultPortal</span></div>
  <a href="{% url 'admin_dashboard' %}" class="nav-link">🏠 Dashboard</a>
  <a href="{% url 'student_list' %}" class="nav-link">👥 All Students</a>
  <a href="{% url 'add_student' %}" class="nav-link">➕ Add Student</a>
  <a href="{% url 'manage_results' %}" class="nav-link">📊 Manage Results</a>
  <a href="{% url 'add_result' %}" class="nav-link">✏️ Add Result</a>
  <div class="sidebar-footer">
    <a href="{% url 'logout' %}" class="nav-link" style="color:rgba(224,80,80,0.8)">🚪 Sign Out</a>
  </div>
</aside>
<main class="main">
  <h1 class="page-title">Edit Student</h1>
  <div class="form-card">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-grid">
        <div class="form-group"><label>Register Number</label>{{ form.register_number }}</div>
        <div class="form-group"><label>Full Name</label>{{ form.full_name }}</div>
        <div class="form-group"><label>Department</label>{{ form.department }}</div>
        <div class="form-group"><label>Semester</label>{{ form.semester }}</div>
        <div class="form-group"><label>Batch Year</label>{{ form.batch_year }}</div>
        <div class="form-group"><label>Phone</label>{{ form.phone }}</div>
        <div class="form-group full"><label>Email</label>{{ form.email }}</div>
      </div>
      <button type="submit" class="btn-primary">Save Changes</button>
      <a href="{% url 'student_list' %}" class="btn-secondary">Cancel</a>
    </form>
  </div>
</main>
</body>
</html>
